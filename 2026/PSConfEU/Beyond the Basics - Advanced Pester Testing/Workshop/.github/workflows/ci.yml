name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck
      - name: Run unit tests
        shell: pwsh
        run: ./build/Invoke-Tests.ps1 -Tag Unit -OutputFile TestResults/unit.xml
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-results
          path: TestResults/unit.xml

  integration:
    name: Integration (docker compose)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - name: Run integration+acceptance in containers
        run: docker compose run --rm --build tests
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-results
          path: TestResults/integration.xml

  cross-platform-unit:
    name: Unit (${{ matrix.os }} / PS ${{ matrix.ps }})
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        ps: ['7.4']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck
      - name: Run unit tests
        shell: pwsh
        run: ./build/Invoke-Tests.ps1 -Tag Unit
