name: Nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run integration+acceptance in containers
        run: docker compose run --rm --build tests
      - name: Run unit + slow on host
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck
          ./build/Invoke-Tests.ps1 -Tag Unit,Slow -ExcludeTag Demo
